# GCP GCE VM: Product C (AI Q&A) — RabbitMQ + ingress stack + llm stack
# Usage (from repo root on VM):
#   bash deploy/fetch_secrets.sh
#   docker compose -f deploy/docker-compose.gcp.yml up -d --build

services:
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    restart: unless-stopped
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ingress-stack:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["run", "--stack", "ingress"]
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - path: ${STREAMER_ENV_FILE:-/run/secrets/.env}
        required: false
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      STREAM_DB_PATH: /data/stream_text.db
      LLM_CHROMA_DIR: /data/chroma
      STREAMER_CONFIG_DIR: /config
      LLM_KNOWLEDGE_PATH: /config/knowledge
      IO_LOG_PATH: /data/logs/chat_io.jsonl
    volumes:
      - ${STREAMER_DATA_DIR:-/data}:/data
      - ${STREAMER_CONFIG_DIR:-/config}:/config

  llm-stack:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["run", "--stack", "llm"]
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - path: ${STREAMER_ENV_FILE:-/run/secrets/.env}
        required: false
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      STREAM_DB_PATH: /data/stream_text.db
      LLM_CHROMA_DIR: /data/chroma
      STREAMER_CONFIG_DIR: /config
      LLM_KNOWLEDGE_PATH: /config/knowledge
      IO_LOG_PATH: /data/logs/chat_io.jsonl
    volumes:
      - ${STREAMER_DATA_DIR:-/data}:/data
      - ${STREAMER_CONFIG_DIR:-/config}:/config

volumes:
  rabbitmq-data:
