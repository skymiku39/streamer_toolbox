repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: block-runtime-artifacts
        name: block runtime data and secrets
        entry: python scripts/pre_commit_block_runtime.py
        language: system
        pass_filenames: true
        always_run: true

      - id: block-retired-commit-wording
        name: block retired commit wording in staged files
        entry: python scripts/pre_commit_forbidden_strings.py
        language: system
        pass_filenames: true

      - id: enforce-commit-message-format
        name: enforce commit message format
        entry: python scripts/pre_commit_commit_msg.py
        language: system
        stages: [commit-msg]
        pass_filenames: true
