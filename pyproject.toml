[project]
name = "streamer-toolbox"
version = "0.1.0"
description = "直播互動助手：設計文件與 stream-core 實作（Pub/Sub 模組）"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "identity-oauth",
    "ingress-discord",
    "ingress-ttv-read",
    "ingress-twitch-audio",
    "ingress-twitch-eventsub",
    "ingress-yt-read",
    "pkg-bus",
    "pkg-events",
    "pkg-safety",
    "pkg-tts",
    "pkg-stream-store",
    "python-dotenv>=1.0.0",
    "sub-character-brain",
    "sub-character-face",
    "sub-character-stage",
    "sub-character-voice",
    "sub-bot-logic",
    "sub-io-log",
    "sub-memory-worker",
    "sub-llm",
    "sub-tts",
    "sub-show-overlay",
    "sub-stream-record",
    "sub-visual",
    "twitch-connector",
]

[tool.uv]
managed = true
package = false

[tool.uv.workspace]
members = [
    "pkg-events",
    "pkg-bus",
    "pkg-safety",
    "pkg-tts",
    "pkg-stream-store",
    "identity-oauth",
    "ingress-twitch-audio",
    "ingress-twitch-eventsub",
    "ingress-ttv-read",
    "ingress-discord",
    "ingress-yt-read",
    "sub-character-brain",
    "sub-character-face",
    "sub-character-stage",
    "sub-character-voice",
    "sub-bot-logic",
    "sub-io-log",
    "sub-memory-worker",
    "sub-llm",
    "sub-tts",
    "sub-show-overlay",
    "sub-stream-record",
    "sub-visual",
    "twitch-connector",
]

[tool.uv.sources]
pkg-stream-store = { workspace = true }
pkg-events = { workspace = true }
pkg-bus = { workspace = true }
identity-oauth = { workspace = true }
ingress-twitch-eventsub = { workspace = true }
ingress-twitch-audio = { workspace = true }
ingress-ttv-read = { workspace = true }
ingress-discord = { workspace = true }
ingress-yt-read = { workspace = true }
pkg-safety = { workspace = true }
pkg-tts = { workspace = true }
sub-character-brain = { workspace = true }
sub-character-face = { workspace = true }
sub-character-stage = { workspace = true }
sub-character-voice = { workspace = true }
sub-bot-logic = { workspace = true }
sub-io-log = { workspace = true }
sub-memory-worker = { workspace = true }
sub-llm = { workspace = true }
sub-tts = { workspace = true }
sub-show-overlay = { workspace = true }
sub-stream-record = { workspace = true }
sub-visual = { workspace = true }
twitch-connector = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0",
    "ruff>=0.11",
]

[tool.pytest.ini_options]
testpaths = [
    "pkg-events/tests",
    "pkg-bus/tests",
    "pkg-safety/tests",
    "pkg-tts/tests",
    "app/tests",
    "pkg-stream-store/tests",
    "identity-oauth/tests",
    "ingress-twitch-eventsub/tests",
    "ingress-twitch-audio/tests",
    "ingress-ttv-read/tests",
    "ingress-discord/tests",
    "ingress-yt-read/tests",
    "sub-character-voice/tests",
    "sub-character-brain/tests",
    "sub-character-face/tests",
    "sub-character-stage/tests",
    "sub-bot-logic/tests",
    "sub-io-log/tests",
    "sub-memory-worker/tests",
    "sub-llm/tests",
    "sub-tts/tests",
    "sub-show-overlay/tests",
    "sub-stream-record/tests",
    "sub-visual/tests",
    "twitch-connector/tests",
]
pythonpath = [
    ".",
    "pkg-events/src",
    "pkg-bus/src",
    "pkg-safety/src",
    "pkg-tts/src",
    "pkg-stream-store/src",
    "identity-oauth/src",
    "ingress-twitch-eventsub/src",
    "ingress-twitch-audio/src",
    "ingress-ttv-read/src",
    "ingress-discord/src",
    "ingress-yt-read/src",
    "sub-character-brain/src",
    "sub-character-face/src",
    "sub-character-stage/src",
    "sub-character-voice/src",
    "sub-bot-logic/src",
    "sub-io-log/src",
    "sub-memory-worker/src",
    "sub-llm/src",
    "sub-tts/src",
    "sub-show-overlay/src",
    "sub-stream-record/src",
    "sub-visual/src",
    "twitch-connector/src",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]

[tool.ruff.lint.isort]
known-first-party = [
    "app",
    "identity_oauth",
    "ingress_discord",
    "ingress_ttv_read",
    "ingress_twitch_audio",
    "ingress_twitch_eventsub",
    "ingress_yt_read",
    "pkg_bus",
    "pkg_events",
    "pkg_safety",
    "pkg_stream_store",
    "pkg_tts",
    "sub_character_brain",
    "sub_character_voice",
    "sub_character_face",
    "sub_character_stage",
    "sub_bot_logic",
    "sub_io_log",
    "sub_memory_worker",
    "sub_llm",
    "sub_stream_record",
    "sub_tts",
    "sub_show_overlay",
    "sub_visual",
    "twitch_connector",
]
