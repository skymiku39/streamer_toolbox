[project]
name = "streamer-toolbox"
version = "0.1.0"
description = "直播互動助手：設計文件與 stream-core 實作（Pub/Sub 模組）"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ingress-ttv-read",
    "ingress-twitch-chat",
    "pkg-bus",
    "pkg-events",
    "python-dotenv>=1.0.0",
    "sub-io-log",
]

[tool.uv]
managed = true
package = false

[tool.uv.workspace]
members = ["pkg-events", "pkg-bus", "ingress-twitch-chat", "ingress-ttv-read", "sub-io-log"]

[tool.uv.sources]
pkg-events = { workspace = true }
pkg-bus = { workspace = true }
ingress-twitch-chat = { workspace = true }
ingress-ttv-read = { workspace = true }
sub-io-log = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0",
    "ruff>=0.11",
]

[tool.pytest.ini_options]
testpaths = [
    "pkg-events/tests",
    "pkg-bus/tests",
    "ingress-twitch-chat/tests",
    "ingress-ttv-read/tests",
]
pythonpath = [
    "pkg-events/src",
    "pkg-bus/src",
    "ingress-twitch-chat/src",
    "ingress-ttv-read/src",
    "sub-io-log/src",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]

[tool.ruff.lint.isort]
known-first-party = [
    "app",
    "ingress_ttv_read",
    "ingress_twitch_chat",
    "pkg_bus",
    "pkg_events",
    "sub_io_log",
]
