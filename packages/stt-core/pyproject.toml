[project]
name = "stt-core"
version = "0.1.0"
description = "STT 共用核心：SttConfig、TranscriptSegment 與 faster-whisper 模型生命週期"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "safety",
]

[project.optional-dependencies]
stt = [
    "faster-whisper>=1.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stt_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.uv.sources]
safety = { workspace = true }
