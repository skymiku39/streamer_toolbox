[project]
name = "identity-oauth"
version = "0.1.0"
description = "Twitch OAuth token provider（橫切 identity bootstrap）"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
identity-oauth = "identity_oauth.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/identity_oauth"]
