[project]
name = "streamer-config"
version = "0.1.0"
description = "外部設定目錄路徑契約、bootstrap 與驗證（方案 A）"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
streamer-config = "streamer_config.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/streamer_config"]
