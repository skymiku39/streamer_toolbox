[project]
name = "tts"
version = "0.1.0"
description = "TTS 引擎抽象（TtsEngine Protocol）與可替換實作"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
sapi5 = ["pywin32>=306; sys_platform == 'win32'"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tts"]
