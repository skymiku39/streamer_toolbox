[project]
name = "ttvchat-lens"
version = "0.1.0"
description = "Read Twitch live chat streams anonymously over IRC WebSocket."
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.2.2",
    "rich>=15.0.0",
    "websockets>=16.0",
]

[project.scripts]
ttvchat-lens = "ttvchat_lens:main"
ttvchat-lens-app = "ttvchat_lens.app:main"
ttvchat-lens-server = "ttvchat_lens.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ttvchat_lens"]
