[project]
name = "bus"
version = "0.1.0"
description = "EventBus Protocol 與 MQ adapter（對齊 docs/events.md）"
requires-python = ">=3.11"
dependencies = [
  "aio-pika>=9.4.0",
  "pika>=1.3.0",
  "events",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bus"]

[tool.uv.sources]
events = { workspace = true }
