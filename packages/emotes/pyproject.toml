[project]
name = "emotes"
version = "0.1.0"
description = "Twitch/YouTube 聊天表情與 badge 解析（IRC、第三方 provider、Helix）"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/emotes"]
